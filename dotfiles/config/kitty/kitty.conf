# reference: https://sw.kovidgoyal.net/kitty/conf/

# scrollback: -1 = unlimited in RAM, bounded by pager history on disk (MB)
scrollback_lines -1
scrollback_pager_history_size 100

# fonts
font_family      JetBrains Mono NL Regular
italic_font      JetBrains Mono NL Italic
bold_font        JetBrains Mono NL Bold
bold_italic_font JetBrains Mono NL Bold Italic
font_size 13

# disable ligatures only on the cursor line
disable_ligatures cursor

# theme — install via `kitty +kitten themes`
# alternatives: GitHub Dark Colorblind, Catppuccin-Mocha, Tokyo Night
include themes/github_dark.conf

# treat left Option as Alt (shell word-motion); right Option stays for special chars
macos_option_as_alt left

# keybindings
# kitty keyboard protocol handles Alt+Arrow correctly for Neovim 0.10+
# free up cmd+left/right for shell or Neovim
map cmd+left  no_op
map cmd+right no_op

# send Shift+Up/Down on Cmd+Up/Down for less/man buffer nav
# map cmd+up   send_text all \x1b[1;2A
# map cmd+down send_text all \x1b[1;2B

# misc
copy_on_select clipboard
shell_integration enabled
enable_audio_bell no
# window_padding_width 4
confirm_os_window_close 0
